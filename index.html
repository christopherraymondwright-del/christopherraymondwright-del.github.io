<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Market Pulse</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@800&family=DM+Mono&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4b055; --bg: #080808; --card: #121212; --text: #ddd5c5; }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; text-align: center; }
        .card { width: 100%; max-width: 450px; background: var(--card); padding: 40px; border-radius: 24px; border: 1px solid #222; margin-top: 40px; }
        .btn { background: var(--gold); color: #000; border: none; padding: 20px; font-family: 'DM Mono'; font-weight: bold; border-radius: 12px; width: 100%; margin-top: 20px; font-size: 14px; }
        .btn:disabled { opacity: 0.3; }
        #audio-player { width: 100%; margin-top: 25px; display: none; }
        .status { margin-top: 25px; font-family: 'DM Mono'; font-size: 10px; color: var(--gold); letter-spacing: 2px; }
        .download-btn { display: none; margin-top: 20px; color: var(--gold); text-decoration: none; font-family: 'DM Mono'; font-size: 12px; border: 1px solid var(--gold); padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>

<div class="card">
    <h1 style="font-family:'Playfair Display'; font-size: 42px; margin: 0;">Market Pulse</h1>
    <p style="opacity: 0.6; font-size: 13px; margin-top: 10px; letter-spacing: 1px;">LIVE MARKET AUDIO BRIEFING</p>
    
    <button class="btn" id="generate-btn" onclick="generateBriefing()">GENERATE DAILY EPISODE</button>
    
    <div id="status" class="status">READY</div>
    
    <audio id="audio-player" controls></audio>
    <a id="download-link" class="download-btn">DOWNLOAD M4A FILE</a>
</div>

<script>
    const PROXY = "https://cors-anywhere.herokuapp.com/";

    async function generateBriefing() {
        const apiKey = localStorage.getItem('gemini_api_key') || prompt("Enter your Gemini API Key:");
        if (!apiKey) return;
        localStorage.setItem('gemini_api_key', apiKey);

        const btn = document.getElementById('generate-btn');
        const status = document.getElementById('status');
        const player = document.getElementById('audio-player');
        const download = document.getElementById('download-link');

        btn.disabled = true;
        status.innerText = "SEARCHING & SPEAKING...";

        try {
            // We use gemini-2.0-flash which supports multimodal output (AUDIO)
            const url = `${PROXY}https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`;
            
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [{ text: "Search for today's top stock market news. Create a 3-minute professional podcast script. Do not mention Elon Musk or his companies. Focus on a 12-month outlook. Output the response as audio." }]
                    }],
                    tools: [{ google_search: {} }],
                    generationConfig: {
                        responseModalities: ["AUDIO"],
                        speechConfig: {
                            voiceConfig: { prebuiltVoiceConfig: { voiceName: "Puck" } } // Professional male voice
                        }
                    }
                })
            });

            const data = await response.json();
            
            // Extract the base64 audio data from Gemini's response
            const audioPart = data.candidates[0].content.parts.find(p => p.inlineData);
            if (!audioPart) throw new Error("No audio returned. Check if your API key has 'Speech' enabled.");

            const audioBase64 = audioPart.inlineData.data;
            const audioBlob = base64ToBlob(audioBase64, 'audio/mp3');
            const audioUrl = URL.createObjectURL(audioBlob);

            // Setup UI
            status.innerText = "EPISODE READY";
            player.src = audioUrl;
            player.style.display = "block";
            
            download.href = audioUrl;
            download.download = `MarketPulse_${new Date().toISOString().split('T')[0]}.m4a`;
            download.style.display = "inline-block";

        } catch (e) {
            console.error(e);
            status.innerText = "ERROR: " + (e.message.includes("fetch") ? "ACTIVATE CORS PROXY FIRST" : "CHECK API KEY");
        } finally {
            btn.disabled = false;
        }
    }

    function base64ToBlob(base64, type) {
        const bin = atob(base64);
        const len = bin.length;
        const arr = new Uint8Array(len);
        for (let i = 0; i < len; i++) arr[i] = bin.charCodeAt(i);
        return new Blob([arr], { type: type });
    }
</script>
</body>
</html>
