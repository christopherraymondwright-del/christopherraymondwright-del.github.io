<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Market Pulse</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@800&family=DM+Mono&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4b055; --bg: #080808; --card: #111; --text: #ddd5c5; }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; margin: 0; padding: env(safe-area-inset-top) 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .header { text-align: center; margin: 40px 0; }
        .logo { font-family: 'Playfair Display', serif; font-size: 48px; color: #ece4d2; }
        .card { width: 100%; max-width: 500px; background: var(--card); padding: 30px; border-radius: 12px; border: 1px solid #222; box-shadow: 0 20px 40px rgba(0,0,0,0.5); text-align: center; }
        .btn { background: var(--gold); color: #000; border: none; padding: 16px 32px; font-family: 'DM Mono'; font-weight: bold; border-radius: 4px; cursor: pointer; width: 100%; }
        .status { margin-top: 20px; font-family: 'DM Mono'; font-size: 12px; color: var(--gold); opacity: 0.8; }
        .script-box { margin-top: 20px; text-align: left; font-size: 14px; line-height: 1.6; max-height: 200px; overflow-y: auto; color: #aaa; border-top: 1px solid #222; padding-top: 15px; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">Market Pulse</div>
    <div style="font-family:'DM Mono'; font-size:10px; color:var(--gold); margin-top:10px;">POWERED BY GEMINI 2.0</div>
</div>

<div class="card">
    <div id="ui-content">
        <p style="margin-bottom:20px; font-weight:300;">Ready for today's market briefing?</p>
        <button class="btn" onclick="startBriefing()">▶ GENERATE & PLAY</button>
    </div>
    <div id="status" class="status"></div>
    <div id="script-container" class="script-box" style="display:none;"></div>
</div>

<script>
    let apiKey = localStorage.getItem('gemini_api_key');

    async function startBriefing() {
        if (!apiKey) {
            apiKey = prompt("Enter your Gemini API Key:");
            if (apiKey) localStorage.setItem('gemini_api_key', apiKey);
        }
        
        const statusEl = document.getElementById('status');
        const scriptEl = document.getElementById('script-container');
        statusEl.innerText = "SEARCHING LIVE MARKETS...";
        
        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [{ text: "Search for today's top stock market headlines. Write a 3-minute conversational podcast script. Include a 12-month stock pick. Never mention Elon Musk or his companies. Format: Pure spoken word text only." }]
                    }],
                    tools: [{ google_search_retrieval: {} }] // This is the magic search tool
                })
            });

            const data = await response.json();
            const script = data.candidates[0].content.parts[0].text;
            
            statusEl.innerText = "SPEAKING...";
            scriptEl.innerText = script;
            scriptEl.style.display = "block";

            // Trigger Text to Speech
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(script);
            utterance.rate = 1.0;
            utterance.pitch = 0.9;
            window.speechSynthesis.speak(utterance);

            utterance.onend = () => { statusEl.innerText = "BRIEFING COMPLETE."; };

        } catch (error) {
            statusEl.innerText = "ERROR: CHECK API KEY OR CONNECTION";
            console.error(error);
        }
    }
</script>
</body>
</html>
