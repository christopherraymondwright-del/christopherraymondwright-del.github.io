<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Market Pulse</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@800&family=DM+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4b055; --bg: #080808; --card: #121212; --text: #ddd5c5; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: env(safe-area-inset-top) 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .card { width: 100%; max-width: 400px; background: var(--card); padding: 40px 30px; border-radius: 24px; border: 1px solid #222; margin-top: 50px; box-shadow: 0 20px 50px rgba(0,0,0,0.9); }
        .btn { background: var(--gold); color: #000; border: none; padding: 20px; font-family: 'DM Mono'; font-weight: bold; border-radius: 14px; width: 100%; font-size: 14px; letter-spacing: 1px; }
        .status { margin-top: 25px; font-family: 'DM Mono'; font-size: 10px; color: var(--gold); opacity: 0.6; }
        #debug { font-size: 10px; color: #666; margin-top: 20px; text-align: left; width: 100%; overflow-x: auto; }
    </style>
</head>
<body>

<div class="card">
    <h1 style="font-family:'Playfair Display'; font-size: 42px; margin: 0;">Market Pulse</h1>
    <p style="opacity: 0.5; font-size: 12px; margin-bottom: 30px;">DAILY BRIEFING GENERATOR</p>
    
    <button class="btn" id="go-btn" onclick="run()">GENERATE & PLAY</button>
    <div id="status" class="status">READY</div>
    <div id="debug"></div>
</div>

<script>
    const PROXY = "https://cors-anywhere.herokuapp.com/";

    async function run() {
        const status = document.getElementById('status');
        const debug = document.getElementById('debug');
        const btn = document.getElementById('go-btn');
        
        let key = localStorage.getItem('gemini_key');
        if (!key) {
            key = prompt("Paste your Gemini API Key:");
            if (key) localStorage.setItem('gemini_key', key);
        }
        if (!key) return;

        btn.disabled = true;
        status.innerText = "FETCHING MARKET DATA...";
        debug.innerText = "";

        try {
            // Using 1.5 Flash for maximum reliability on Free Tier
            const api = `${PROXY}https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`;
            
            const response = await fetch(api, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: "Search today's stock news. Write a short, punchy 1-minute podcast script. No Elon Musk mentions. End with one stock pick for 2026. No markdown, just text." }] }],
                    tools: [{ google_search_retrieval: {} }]
                })
            });

            const data = await response.json();

            if (data.error) {
                throw new Error(`${data.error.status}: ${data.error.message}`);
            }

            const script = data.candidates[0].content.parts[0].text;
            status.innerText = "SPEAKING...";

            // HIGH QUALITY iOS VOICE SETTINGS
            window.speechSynthesis.cancel();
            const talk = new SpeechSynthesisUtterance(script);
            
            // Try to find the "Premium" iOS voice
            const voices = window.speechSynthesis.getVoices();
            talk.voice = voices.find(v => v.name.includes('Samantha') || v.name.includes('Daniel')) || voices[0];
            talk.rate = 1.0;
            talk.pitch = 1.0;

            window.speechSynthesis.speak(talk);
            
            talk.onend = () => { status.innerText = "BRIEFING COMPLETE"; btn.disabled = false; };

        } catch (e) {
            btn.disabled = false;
            status.innerText = "ERROR";
            debug.innerText = "Full Error: " + e.message;
            if (e.message.includes("403")) debug.innerText += " (Check if your API Key is restricted or if you need to enable the Grounding tool in AI Studio)";
            if (e.message.includes("fetch")) debug.innerText = "CORS BLOCK: Please go to cors-anywhere.herokuapp.com and tap 'Request Access'.";
        }
    }

    // iOS requires a user gesture to load voices
    window.speechSynthesis.getVoices();
</script>
</body>
</html>
